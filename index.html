<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: black;
        }

        /* Vídeo de fundo forçado */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover;
            background-size: cover;
        }

        .container {
            z-index: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-container img {
            max-width: 85%;
            max-height: 400px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        /* Botão Rosa com Letras Vermelhas */
        .btn-presente {
            background-color: #ffc0cb;
            color: #ff0000;
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hidden {
            display: none;
        }

        /* Texto personalizado embaixo da foto */
        .texto-mae {
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 15px;
            max-width: 90%;
        }

        .heart-particle {
            position: absolute;
            color: #ff4b5c;
            font-size: 25px;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 3s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Vídeo de fundo com comandos para carregar melhor -->
    <video autoplay muted loop playsinline poster="foto.jpg" id="bg-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- Tela 1: Só o Botão -->
    <div id="step1" class="container">
        <button class="btn-presente" onclick="showGift()">Receber Presente</button>
    </div>

    <!-- Tela 2: Foto + Texto embaixo -->
    <div id="step2" class="container hidden">
        <div class="photo-container">
            <img src="foto.jpg" alt="Foto especial">
        </div>

        <!-- Coloque seu texto aqui embaixo -->
        <div class="texto-mae" onclick="rainHearts()">
            SUA MENSAGEM PERSONALIZADA AQUI ❤️
        </div>
    </div>

    <script>
        function showGift() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            // Garante que o vídeo tente rodar ao interagir
            const v = document.getElementById('bg-video');
            v.play().catch(error => console.log("Vídeo aguardando interação"));
            
            // Inicia a chuva de corações automaticamente ao abrir
            rainHearts();
        }

        function rainHearts() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart-particle');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
